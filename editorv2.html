                    const r = tx.objectStore('handles').get(k);
                    r.onsuccess = () => res(r.result || null);
                });
            }

            async function ensurePerm(handle) {
                const opts = { mode: 'readwrite' };
                if ((await handle.queryPermission(opts)) === 'granted') return true;
                return (await handle.requestPermission(opts)) === 'granted';
            }

            function setConnected(handle) {
                repoHandle = handle;
                topbar.classList.add('connected');
                repoStatus.innerHTML = `<span class="dot"></span>connected: <b>${handle.name}</b>`;
                connectBtn.textContent = 'change';
                reconnectBtn.classList.add('hidden');
                enableEditor();
                checkForDraft();
            }

            async function pickRepo() {
                if (!supportsFS) { showToast('browser doesn\'t support direct saves', true); return; }
                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await dbSet('repo', handle);
                    setConnected(handle);
                } catch (err) {
                    if (err.name !== 'AbortError') showToast('failed: ' + err.message, true);
                }
            }

            function enableEditor() {
                document.querySelector('.frontmatter').classList.remove('disabled');
                blocksEl.classList.remove('disabled');
                actionsEl.classList.remove('disabled');
            }

            function disableEditor() {
                document.querySelector('.frontmatter').classList.add('disabled');
                blocksEl.classList.add('disabled');
                actionsEl.classList.add('disabled');
            }

            // ---------- draft management ----------
            function saveDraft() {
                const draft = {
                    title: document.getElementById('title').value,
                    date: document.getElementById('date').value,
                    tags: document.getElementById('tags').value,
                    blocks: state.blocks,
                    savedAt: new Date().toISOString()
                };
                localStorage.setItem('blog-draft', JSON.stringify(draft));
                showToast('draft saved to browser');
            }

            function loadDraft() {
                const saved = localStorage.getItem('blog-draft');
                if (!saved) return false;
                try {
                    const draft = JSON.parse(saved);
                    document.getElementById('title').value = draft.title || '';
                    document.getElementById('date').value = draft.date || '';
                    document.getElementById('tags').value = draft.tags || '';
                    state.blocks = draft.blocks || [{ id: nid(), type: 'paragraph', text: '' }];
                    render();
                    showToast('draft loaded');
                    return true;
                } catch (err) {
                    console.error('failed to load draft:', err);
                    return false;
                }
            }

            function checkForDraft() {
                const saved = localStorage.getItem('blog-draft');
                if (!saved) return;
                try {
                    const draft = JSON.parse(saved);
                    const savedAt = new Date(draft.savedAt);
                    const timeAgo = formatTimeAgo(savedAt);
                    document.getElementById('draft-time').textContent = `Saved ${timeAgo}`;
                    draftBanner.classList.add('show');
                } catch (err) {
                    console.error('failed to check draft:', err);
                }
            }

            loadDraftBtn.addEventListener('click', () => {
                loadDraft();
                draftBanner.classList.remove('show');
            });

            dismissDraftBtn.addEventListener('click', () => {
                if (confirm('are you sure? this will delete the saved draft.')) {
                    localStorage.removeItem('blog-draft');
                    draftBanner.classList.remove('show');
                    showToast('draft dismissed');
                }
            });

            function formatTimeAgo(date) {
                const seconds = Math.floor((new Date() - date) / 1000);
                if (seconds < 60) return 'just now';
                const minutes = Math.floor(seconds / 60);
                if (minutes < 60) return `${minutes} minute${minutes !== 1 ? 's' : ''} ago`;
                const hours = Math.floor(minutes / 60);
                if (hours < 24) return `${hours} hour${hours !== 1 ? 's' : ''} ago`;
                const days = Math.floor(hours / 24);
                return `${days} day${days !== 1 ? 's' : ''} ago`;
            }

            saveDraftBtn.addEventListener('click', saveDraft);

            // ---------- load post ----------
            async function openPostPicker() {
                if (!repoHandle) {
                    showToast('connect a repo first', true);
                    return;
                }
                if (!(await ensurePerm(repoHandle))) {
                    showToast('permission denied', true);
                    return;
                }
                postList.innerHTML = '';
                postSearch.value = '';
                try {
                    const postsDir = await repoHandle.getDirectoryHandle('_posts', { create: false });
                    const files = [];
                    for await (const entry of postsDir.values()) {
                        if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                            files.push(entry);
                        }
                    }
                    files.sort((a, b) => b.name.localeCompare(a.name));
                    allPosts = files;
                    renderPostList('');
                    postPicker.classList.add('show');
                    postSearch.focus();
                } catch (err) {
                    showToast('failed to list posts: ' + err.message, true);
                }
            }

            function renderPostList(query) {
                const q = query.trim().toLowerCase();
                const filtered = q
                    ? allPosts.filter(e => e.name.toLowerCase().includes(q))
                    : allPosts;
                postList.innerHTML = '';
                if (allPosts.length === 0) {
                    postList.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;">no posts found in _posts/</div>';
                    return;
                }
                if (filtered.length === 0) {
                    postList.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;">no matches</div>';
                    return;
                }
                filtered.forEach(entry => {
                    const item = document.createElement('div');
                    item.className = 'post-item';
                    item.textContent = entry.name;
                    item.onclick = () => loadPost(entry);
                    postList.appendChild(item);
                });
            }

            postSearch.addEventListener('input', () => renderPostList(postSearch.value));

            async function loadPost(fileHandle) {
                try {
                    const file = await fileHandle.getFile();
                    const text = await file.text();
                    const { frontMatter, blocks } = parseMarkdown(text);
                    const fm = parseFrontMatter(frontMatter);
                    document.getElementById('title').value = fm.title;
                    document.getElementById('date').value = fm.date;
                    document.getElementById('tags').value = fm.tags;
                    state.blocks = blocks.length ? blocks : [{ id: nid(), type: 'paragraph', text: '' }];
                    render();
                    postPicker.classList.remove('show');
                    showToast(`loaded ${fileHandle.name}`);
                } catch (err) {
                    showToast('failed to load: ' + err.message, true);
                }
            }

            loadPostBtn.addEventListener('click', openPostPicker);

            resetBtn.addEventListener('click', () => {
                if (!confirm('clear the editor? unsaved changes will be lost.')) return;
                document.getElementById('title').value = '';
                document.getElementById('date').value = nowLocalDateTime();
                document.getElementById('tags').value = '';
                state.blocks = [{ id: nid(), type: 'paragraph', text: '' }];
                render();
                showToast('editor cleared');
            });
            postPickerClose.addEventListener('click', () => postPicker.classList.remove('show'));
            postPicker.addEventListener('click', (e) => {
                if (e.target === postPicker) postPicker.classList.remove('show');
            });

            connectBtn.addEventListener('click', pickRepo);

            reconnectBtn.addEventListener('click', async () => {
                const saved = await dbGet('repo');
                if (saved && (await ensurePerm(saved))) {
                    setConnected(saved);
                } else {
                    showToast('permission denied or repo not found', true);
                }
            });

            saveBtn.addEventListener('click', async () => {
                saveDraft(); // auto-save draft when saving to repo
                if (!repoHandle) return;
                if (!(await ensurePerm(repoHandle))) { showToast('permission denied', true); return; }
                try {
                    const postsDir = await repoHandle.getDirectoryHandle('_posts', { create: true });
                    const name = buildFilename();
                    const fh = await postsDir.getFileHandle(name, { create: true });
                    const w = await fh.createWritable();
                    await w.write(buildFullMarkdown());
                    await w.close();
                    localStorage.removeItem('blog-draft'); // clear draft after successful save
                    showToast(`saved _posts/${name}`);
                } catch (err) {
                    showToast('save failed: ' + err.message, true);
                }
            });

            function showToast(msg, isError) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.toggle('error', !!isError);
                toast.classList.add('show');
                clearTimeout(showToast._t);
                showToast._t = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            // try to restore previous repo
            (async () => {
                if (!supportsFS) return;
                const saved = await dbGet('repo');
                if (saved) {
                    repoStatus.innerHTML = `<span class="dot"></span>last folder: <b>${saved.name}</b>`;
                    connectBtn.textContent = 'change';
                    reconnectBtn.classList.remove('hidden');
                }
                // editor stays disabled until explicitly connected
            })();

            // ---------- init ----------
            // start with editor disabled until repo is connected
            disableEditor();

            // pre-fill datetime with current local time in YYYY-MM-DDTHH:MM:SS format
            function nowLocalDateTime() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            }
            document.getElementById('date').value = nowLocalDateTime();
            render();
        })();
    </script>
</body>

</html>
